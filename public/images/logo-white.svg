<!-- ShiftBuddy Logo - Light Background -->
<svg width="420" height="100" viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- Icon -->
  <g transform="translate(10,10)">
    <!-- Hard hat -->
    <path d="M40 10 Q70 10 80 40 L0 40 Q10 10 40 10 Z" fill="#E87722"/>

    <!-- Brim -->
    <rect x="5" y="40" width="70" height="8" rx="4" fill="#E87722"/>

    <!-- House cutout -->
    <polygon points="40,28 55,40 25,40" fill="#FFFFFF"/>
    <rect x="30" y="40" width="20" height="15" fill="#FFFFFF"/>
  </g>

  <!-- Divider -->
  <line x1="110" y1="20" x2="110" y2="80" stroke="#4376b1" stroke-width="2"/>

  <!-- Text -->
  <text x="130" y="60" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold">
    <tspan fill="#0D2D4E">Shift</tspan><tspan fill="#E87722">Buddys</tspan>
  </text>
</svg>
